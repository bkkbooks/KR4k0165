body:
  text: 康雍乾間文字之獄清佚名撰著莊廷鑨之獄明相國烏程朱文恪公嘗著明史舉大經大法者革之已刊行於世未刊者爲列朝諸臣傳國變後朱氏家中落以槁本質千金于莊廷鑨廷家故富因竄名己作刻之補崇禎一朝事中多指斥昭代語歲癸卯歸安知縣吳之榮罷官謀以告訐爲功藉此作起複地白其事于將軍松魁魁移巡撫朱昌祚朱牒督學胡尚衡廷鑨並納重賂以免乃稍易指斥語重刊之之榮計不行特購得初刊本上之法司事聞遣禮部侍郎出讞獄時廷鑨已死戮其屍誅弟廷鉞舊禮部侍郎李令皙曾作序亦伏法並及其四子令皙幼子年十六法司令其減供一歲例得免死充軍對曰予見父兄死不忍獨生卒不易供而死序中稱舊史朱氏者指文恪也之榮素怨南潯富人朱佑明遂嫁禍且指其姓名以證並誅其五子松魁及幕客程維藩械赴京師魁以入議僅削官維藩戮于燕市昌祚尚衡賄讞獄者委過於初申覆之學官歸安烏程兩學官並坐斬而二人倖免湖州太守譚希閔蒞官甫半月事發與推官李煥皆以隱匿罪至絞滸墅關榷貨主事李尚白聞閶門書坊有是書遣役購之適書賈他出役坐其鄰一朱姓者少侍及書賈返朱爲判其價時主事已入京以購逆書立斬書賈及役斬于杭鄰朱姓者因年逾七十免死偕其妻發極邊歸安第元錫方爲朝邑令與吳之鏞之銘兄弟嘗預參校悉被戮時江楚諸名士列名書中者皆死刻工及鬻書者同日刑惟海甯查繼佐仁和陸圻當獄初起先首告謂廷鑨慕其名列之參校中得脫罪是獄也死者七十余人婦女並發邊蓋浙之大吏及讞獄之侍郎鑒於松魁且畏之榮複有言雖有冤者不敢奏雪也之榮卒以此起用並以所藉朱佑明之産給之後仕至右僉都戴名世之獄桐城方孝標嘗以科第起官至學士後以族人方猷丁酉主江南試與之有私並去官遣戍遇赦歸入滇受吳逆僞翰林承旨吳逆敗孝標先迎降得免死因著鈍齋文集滇黔紀聞極多悖逆語戴名世見而喜之所著南山集多採錄孝標所紀事尤雲鍔方正玉爲之捐資刊行雲鍔正玉及同官汪灝朱書劉嚴餘生王源皆有序板則寄藏于方苞家都諫趙申喬奏其事九卿會鞫終戴名世大逆法至寸磔族皆棄市未及冠笄者發邊朱書王源已故免議尤雲鍔方正玉汪灝劉嚴餘生方苞以謗論罪絞時方孝標已死以戴名世之罪罪之子登嶧雲旅孫世樵並斬方氏有服者皆坐死且剉孝標屍尚書韓菼侍郎趙士麟禦史劉灝淮揚道王英謨庶吉士汪份等三十二人並別議降謫疏奏聖祖惻然凡議絞者改編戍汪灝以曾效力書局赦出獄方苞編旗下尤雲鍔方正玉免死徙其家方氏族屬止謫黑龍江韓菼以下平日與戴名世論文牽連者俱免議是案也得恩旨全活者三百餘人康熙辛卯壬辰間事也查嗣庭之獄雍正四年江西正考官爲禮部侍郎查嗣庭試題曰維民所止有訐者謂維止二字是取雍正二字去其首也獄遂起今將當時上諭全錄於此事始未可見矣雍正四年九月乙卯諭內閣九卿翰詹科道等查嗣庭向來趨附隆科多隆科多曾經薦舉朕令在內庭行走授爲內閣學士後見其語言虛詐兼有狼顧之相料其心術不端從未信任及禮部侍郎員缺需人蔡珽又複將伊薦舉今歲各省鄉試屆期朕以江西大省須得大員以典試事故用伊爲正考官今閱江西試錄所出題目顯露心懷怨望譏刺時事之意料其居心淺薄乖張平日必有紀載遣人查其寓所及行李中則有日記二本悖亂荒唐怨誹捏造之語甚多又于聖祖仁皇帝用人行政大肆訕謗以翰林改授科道爲可恥以裁汰冗員爲當厄以欽賜進士爲濫舉以戴名世獲罪爲文字之禍以趙晉正法爲因江南之流傳對句所致以科場作弊之知縣方名正法爲冤抑以清書庶常複考漢書爲苛刻以庶常散館爲畏途以多選庶常爲蔓草爲厄運以殿試不完卷黜革之進士爲非罪熱河偶然發水則書淹死官員八百人其餘不計其數又書雨中飛蝗蔽天似此一派荒唐之言皆未有之事而伊公然造作書寫至其受人屬托代人營求之事不可枚舉又有科場關節及科場作弊書信皆甚屬詭秘今若但就科場題目加以處分則天下之人必有以查嗣庭爲出於無心偶因文字獲罪爲伊稱屈者今種種實迹見在尚有何辭以爲之解免乎爾等漢官讀書稽古曆觀前代以來得天下未有如我朝之正者況世祖聖祖重熙累洽八十餘年深仁厚澤淪肌浹髓天下億萬臣民無不坐享升平之福我皇考加恩臣下一視同仁及朕即位以來推心置腹滿漢從無異視蓋以人之賢否不一各處皆有善良各處皆有奸慝不可以一人而概衆人亦不可以一事而概衆事朕惟以至公至平之心處之爾等當仰體朕心各抒誠悃交相勉勵殫竭公忠無負平日立身立德之志或有一二心術不端者亦宜清夜自省痛加悛改朕今日之諭蓋欲正人心維風俗使普天率土永享升平之福也爾等承朕訓旨當曉然明白勿存疑愧避忌之念但能恪慎供職屏去習染之私朕必知之朕惟以至誠待臣下臣下有負朕恩者往往自行敗露蓋普天率土皆受朝廷恩澤鹹當知君臣之大義一心感戴若稍萌異志即爲逆天之人豈能逃於誅戮報應昭彰纖豪不爽諸臣勉之戒之查嗣庭讀書之人受朕格外擢用之恩而伊逆天負恩譏刺咒詛大幹法紀著將查嗣庭革職拿問交三法司嚴審定擬甲戌諭大學士九卿翰詹科道等爾等多出自科甲之人既誦法聖賢讀書明理當知君臣之大義須上下一體情分相聯方克致升平之治人人共受其澤自唐宋以來去古已遠習俗澆漓人心詐僞狂妄無忌憚之徒往往腹誹朝政甚至筆之於書肆其誣謗如汪景祺查嗣庭豈能逃於天遣乎我國家恩養休息海宇晏清八十餘年萬民樂業即爾等父母妻子孰不沐浴膏澤安享其福耶且士人立身行己以禮義廉恥爲重乃至昏夜乞憐上書投紥滿紙稱功頌德之語何廉恥蕩然至於此極又有將子弟姻戚門生故舊私書請托者不知以素所親愛之人爲之請若先有請托彼心以爲勢力可恃肆其狂妄無所不爲及實在贓托照拂實屬無益而有損蓋彼無倚恃尚知警惕自守勉勵供職款發覺則受請托者不能爲之庇護是非所以愛之而實以害之也又爾等皆系各省州縣之百姓受制于有司者如請托之風盡除凡地方有司皆有所畏懼而廉潔愛民則爾等之子孫宗族咸受其慶不亦善乎如請托之風不絕則地方官員各有倚賴將肆其貪婪則爾等之家產不足飽貪官污吏之溪壑爾等自爲身家桑梓計亦斷應速改歷代之陋習也查嗣庭請托賄屬之書劄不一而足其日記所載狂妄悖逆之語與汪景祺相爲表裏而其誹議聖祖仁皇帝用人行政大逆不道之言不可勝舉實共工驩兜之流也陸生楠之獄以論前史而獲罪者自陸生楠之獄始自茲以往非惟時事不敢論議即陳古經世之書亦不敢讀矣此真歷代文字獄所未前聞也雍正七年秋七月丙午諭內閣據順承郡王錫保奏在軍前效力之陸生楠細書通鑒論七十篇抗憤不平之語甚多其論封建之利言詞更屬狂悖顯系非議時政參奏前來陸生楠由廣西舉人部選江南吳縣知縣朕覽其履歷奏摺前惟頌聖浮詞中間不過腐爛時文無一語近于直言規正亦無一事切於國計民生而倨傲誕妄之氣溢於言詞知其人必非醇謹及至引見之時舉動乖張朕將伊折內之語詰問數條陸生楠總默然不能對但聞朕教訓轉多憤懣之色彼時將伊扣缺令以主事試用蓋以其人或小有才令其在京辦事學習以冀悛改也後伊改授工部主事引見時不惟毫無敬畏且傲慢不恭顯然逆抗形於詞色夫主事職列部曹外任知縣曆俸多年或卓異行取始得升補而陸生楠以邊方舉人筮仕之初即膺茲職尚何負于伊而伊竟敢懟及君父乎伊系廣西人平日必有與李紱謝濟世結爲黨援之處故敢如此是以將伊革職發往軍前與謝濟世同時效力一則令其觀滿州尊君親上之心如此其謹懍一則令其觀我朝兵營之制如此其整嚴一則令其觀各蒙古部落熙皞醇樸之風如此其誠實庶冀伊等化去私邪勉于自新之路詎意陸生楠素懷逆心毫無悔悟怙惡之念愈深奸慝之情益固借托古人之事幾誣引古人之言論以泄一己不平之怨怒肆無忌憚議論橫生至於此極也前錫保起行之時朕諭以軍前效力之漢官等果能安靜守法自知罪過則皆可貸其前愆開予自新或有私自著作怨懟罔上者亦未可定今果得陸生楠所著之書悖逆之情盡行敗露其論封建雲封建之制古聖人萬世無弊之良規廢之爲害不循其制亦爲害至於今害深禍烈不可勝言皆郡縣之故等語古人之有封建原非以其制爲盡善而特創此以駕馭天下也洪荒之世聲教未通各君其國各子其民有聖人首出則天下之衆莫不尊親而聖人即各因其世守封之亦衆建親賢以參錯其間蓋時勢如此雖欲統一之而不能也夏禹塗山之會執玉帛者萬國周武王孟津之役來會者八百侯國豈非夏後周王之所封建乎孔子曰天下有道則禮樂征伐自天子出孟子曰天下惡乎定定於一孔子孟子深見春秋戰國諸侯戰爭之流弊其言已啓一統之先幾矣至秦始皇統合六國制天下以郡縣自漢以來遂爲定制蓋三代以前諸侯分有土地天子不得而私故以封建爲功秦漢之後土地屬之天子一封建便多私心故以郡縣爲功唐柳宗元謂公天下自秦始宋蘇軾謂封建者爭之端皆確有所見而雲然也且中國之郡縣亦猶各蒙古之有部落耳歷代以來各蒙古自爲雄長亦互相戰爭至元太祖之世始成一統曆前明二百餘年我太祖高皇帝開基東土遐邇率服而各蒙古又複望風歸順鹹凜正朔以迄於今是中國之一統始于秦塞外之一統始於元而極盛於我朝自古中外一家幅員極廣未有如我朝者也至若賈誼晁錯欲削弱諸侯乃慮分封之失而欲一之非以郡縣爲失而欲分之也李泌因藩鎮之兵連禍結思以封建爲自固之謀豈嘗謂三代之制必可複乎今六合成大一統之天下東西南朔聲教所被莫不尊親而陸生楠雲以郡縣之故至於今害深禍烈不可勝言試問今日之禍害何在陸生楠能明指之乎大凡叛逆之人如呂留良曾靜陸生楠之流皆以宜複封建爲言蓋此種悖亂之人自知奸惡傾邪不容于鄉國思欲效策士遊說之風意謂封建行則此國不用可去之他國殊不知狂肆逆惡如陸生楠之流實天下所不容也又雲聖人之世以同寅協工爲治後世天下至大事繁人多奸邪不能盡滌詐僞不能盡燭大抵封建廢而天下統於一相既勞而不能深謀君亦煩而不能無缺失始皇一片私心流毒萬世等語同寅協工固爲治之要至於知人任相惟在人君之明哲漢唐以來有賢君圖治於上則必有良將助治於下豈萬世無一知人之主乎且同寅協工之道于封建何與陸生楠肆意妄言支離繆戾至於如此其言建儲也借引漢武帝戾太子事發論雲儲貳不宜干預外事且必更使通曉此等危機等語書有教胄子之文禮有文王世子之篇儀義明備教戒周詳凡以養成德性欲其學於古訓深知民情物理之微周知人間疾苦稼穡艱難之故豈可禁之不聞外事乎至於父子天性家國一理惟有至誠至敬可以爲事親之道危機之說豈人子所忍形於言存諸心者乎設使江充掘蠱之時太子能居易俟命不詐出武庫兵發長樂衛則決不至有湖城之難是戾太子之禍正由於曉危機也又陸生楠雲有天下者不可以無本之治治之等語其意借鈎弋宮堯母門之事以譏本朝之不早建儲貳夫建儲之事乃宗廟社稷之業所關天下蒼生萬民之命所系也倘不加慎重而所立不得其人其後不易之而不可欲易之而不可以至激爲多故者前代史冊歷歷可稽孟子曰爲天下得人者謂之仁又曰爲天下得人難言主器之重必得其人足以承先啓後者然後可以付之也我朝太祖高皇帝開創以來未嘗預建儲位而我太宗文皇帝繼位元丕承恢宏大烈世祖章皇帝紹業膺圖撫有中夏聖祖仁皇帝深仁厚澤禦宇綿長凡我朝聖聖相承皆未由先正青宮而後踐天位乃開萬世無疆之基業錫億兆臣民之洪庥逮朕纘登大寶重熙累洽之盛統七年以來中外乂安是我朝國本至深至厚者愚人固不能知也昔宋孝宗時虞允文請早建儲貳孝宗曰恐儲位既正人性易驕即自縱逸不勤於學寢有失德所以未建者庶幾無後悔耳孝宗尚知立儲之不易況我聖哲高遠之見十倍于孝宗乎如陸生楠借漢武之事以譏刺者實爲彌天不可赦之罪人也其論制也則稱唐之府兵雲李泌爲德宗曆敘府兵興廢之由府兵既廢禍亂遂生至今爲梗上陵下替又雲府兵之制國無養兵之費臣無專兵之患等語唐初府兵之制本于北周蘇綽之儀其後變爲彍騎乃府兵廢馳不得不出於召募也德宗之世召募者多市人不可用故欲複府兵之法然其時亦竟不能複孔子曰以不教民戰是謂棄之無事耕種之農豈能嫻于武備有事徵發之擾豈能兼顧農桑以此爲制不但棄其兵並棄其民矣古者六鄉六遂之法遠不可稽後世民以養兵兵以衛民彼此相資唐宋以來法制漸詳軍農實稱兩便安有惜養兵之費而棄不教之民者乎本朝設立八旗京師重地禁旅雲屯又有巡撫三營以詰奸禁暴外省分設駐防將軍以及提鎮內外相維訓諫甚備無事則分處什伍兵不擾民有事則整旅出疆兵以衛民此萬古之良法今八十年來太平無事老耆以壽終幼孤得遂長孰非兵防衛守之力哉民間雖有正供以佐軍糈然所出僅百分中之一耳其得養兵之利也多矣而陸生楠之爲此說者蓋其懷蓄逆亂之心鬱不得逞故以國無養兵之費以搖動人聽冀或更制以紊亂軍政所謂執左道以亂政言僞學非以疑衆者王法之所不宥也其論隋煬帝雲後之君臣倘非天幸其不爲隋之君臣者幾希等語隋文帝以勤學節儉爲治史稱其倉庫實而法令行至隋煬帝以驕奢淫佚自取敗亡非可諉之於天也後之人主不爲煬帝之行豈至有煬帝之禍又何爲而望天幸乎陸生楠之意又何指也其論人主雲人愈尊權愈重則身愈危禍愈烈蓋可以生人殺人賞人罰人則我志必疏而人之畏之者必愈甚人雖怒之而不敢泄欲報之而不敢輕故其蓄必深其發必毒等語人主身爲天子富有四海自堯舜禹湯以來一人有慶兆民賴之豈有位尊而即危禍者乎至於生殺賞罰人主皆奉天命天討以行之其生殺賞罰者皆其人之自取耳朕臨禦以來日理萬幾皆奉若天道因物以付未嘗以己意生殺人賞罰人而陸生楠爲畏之怒之報之之說試問在廷諸臣朕自雍正以來曾以藩邸舊人而擢用者何人曾因當時宿怨而治罪者何人且朕從前與外廷之人毫無恩怨又何所庸其畏何所庸其怒何所庸其報哉且雲蓄必深發必毒此陸生楠指阿其那等而言抑陸生楠自蓄此心也何其那等各案內外臣工之所共知無俟朕再爲告諭陸生楠亦身列仕籍豈無見聞而爲此論其狂悖惡亂不亦甚乎又雲雖怒之而不敢泄欲報之而不敢輕乃陸生楠自述其心也明矣雖蓄怒而不敢顯言是以托於論列通鑒以微泄其憤又怨而欲報欲報而不能但以身爲禍烈等語肆爲咒詛其逆謀髮露公然形於紙筆矣其論相臣雲當用首相一人首相奸諂誤國許凡欲效忠者皆得密奏即或不當亦不得使相臣知之等語夫從來不廢密奏者原欲周知天下之利弊無專令參揭相臣之理況尊賢之道最要在於去讒敬大臣之道在於官盛任使君臣一德一心乃爲元首股肱之義是以擇相之道惟在得人若既得其人而又使人密奏且奏或不當而猶多方掩飾是窺伺挾詐教人以讒慝而招人以排陷也且臣相果屬憸邪便當露章宣奏而群小故爲排沮或欲動搖大臣或從門戶起見人主自宜分別是非以定邪正豈可調停和處於其間乎又雲因言固可知人斬聽亦有失人聽言不厭其廣廣則庶幾無壅擇言不厭其審審則庶幾無誤等語舜命禹曰無稽之言勿聽勿詢之謀勿庸召公奭告武王曰言以道接朕於人言必決之以理揆之以情未嘗拒人之言亦未嘗輕聽人言此內外臣工所共知者陸生楠何爲而有此譏議乎又雲爲君爲臣莫要於知人而立大本不徒在政迹然亦不可無術相防等語君臣之間豈容絲毫權術乎三載考績必以政事爲據若不以政迹人亦何由而知耶其論王安石雲賢才盡屏咨謀盡廢而己不以爲非人君亦不知人之非則並聖賢之作用氣象而不知等語聖人廓然大公物來順應有何作用乎宋神宗銳意求治而安石任意更張其失在於作用明矣又雲篤恭而天下平之言彼固未之見知天知人之言彼似未之聞也人無聖學能文章不安平庸鮮不爲安石者等語安石之誤國在於不引其君於當道非謂知天知人惟有端居深拱靜默無爲篤恭於無聲無臭之表而遂可使天下平也故夫篤恭而天下平者正由敬信勸威之道而極言其效如此非百務盡隳上下暌絕而後可爲治也其文詞議論險怪背謬無理之甚又其論無爲之治雲雖有憂勤不離身心雖有國事亦第存乎納領不人人而察但察銓選之任不事事而理止理付元之人察言動謹幾微防讒間慮疏虞憂盛危明防微杜漸而已至若籩豆之事則有司存等語從古聖帝明王之道未有不以勤勞自勵而以逸樂無爲爲治者也是以治天下莫大于用人理財二端理財一事自應付之臣下至用人之權不可旁落今試以銓選之權付之大臣大臣敢膺此任乎無論稍存容私徇情之見者固不可一日當此重任即秉公持正之人於同舍黜陟之際不爲怨府即爲禍源矣至若懋昭令德克勤小物不泄邇不忘遠古訓昭然漢宣帝綜核名實治理一新光武務勤吏治唐太宗書守令姓名於禦屏朝夕省覽古來賢主未有不本於勤勞者豈可以用人大節爲籩豆之事置之不問也又雲絳度教諫異鎛順從是以陷於朋比而不知蓋有聖功即有王道使徒明而不學則人欲盛而天理微固不能有三代之事功至力衰而志隳未有能如其初等語夫嘉謀嘉猷入告於爾後乃朕日所望於大小臣工者即位以來時時諭令諸臣以忠言讜論面折廷諍凡內外諸臣條陳政務有當理而可行者必令廷臣詳議施行並未嘗拒諫諍而喜順從也至於人臣朋比歷代有之有以阿諛諂附爲朋比亦有似傾險幸直爲朋比如漢之梁竇唐之牛李宋之紹述明之門戶是也若唐虞之世盈廷師濟一德一心謂之朋比可乎以上皆陸生楠論斷通鑒中語朕指出數條如此陸生楠生當盛世服習詩書身叨乙榜赴選朝官非若曾靜之僻處深山曠野不知天高地厚冥頑不靈之人也且觀其人未嘗不小有才謂宜感恩戴德勉恩報效而乃懷不逞之邪心于進身筮仕之時肆無稽之橫議於政教修明之日對越大廷則暴戾恣睢之氣形於詞色遠逐邊塞則倡狂怪誕之說任意發舒其意專以搖惑衆心擾亂政紀爲務朕實不知其怨望何自而生憤懣何自而積此真逆性由於夙成狡惡因之紛起誠不知天命而小畏小人中之尤無忌憚者也陸生楠罪大惡極情無可逭朕意欲將陸生楠於軍前正法以爲人臣懷怨誣訕者之戒著九卿翰詹科道秉公定擬具奏曾靜呂留良之獄曾呂之獄本朝諸文字獄中第一巨案也世宗至將其始末自著一書名曰大義覺迷錄頒之學官使秀才人人同讀與臥碑聖諭廣訓等同視後至乾隆間而大義覺迷錄始爲禁書雍正間之頒之學官世宗之深心也乾隆間之列爲禁書又高宗之深心也各從其時要之皆專制國之雄主矣今采大義覺迷錄中上諭彙列之共省覽焉事之緣起皆仍原文不加褒貶讀者當能得之於言外也先是湖南靖州人曾靜因考試劣等家居憤鬱忽圖叛逆遣其徒張熙詭名投書于川陝總督岳鍾琪勸以同謀舉事嶽鍾琪拘留刑訊究問指使之人張熙甘死不吐岳鍾琪置之密室許以迎聘伊師佯與設誓張熙始將曾靜供出岳鍾琪具奏並其逆書奏聞奉旨差刑部侍郎杭奕祿正白旗副都統覺羅海蘭至湖南會同巡撫王國棟拘捉曾靜審訊據曾靜供稱生長山僻素無師友因應試州城得見呂留良評選時文內有妄論夷夏之防及井田封建等語遂被蠱惑隨遣張熙至浙江呂留良家訪求書籍呂留良子呂毅中授以伊父所著詩文內皆憤懣激烈之詞益加傾信又往訪呂留良之徒嚴鴻逵與鴻逵之徒沈在寬等往來投契因致沈溺其說妄生異心等語隨將曾靜張熙提解來京旋命浙江總督李衛搜查呂留良嚴鴻逵沈在寬家藏書籍所獲日記等逆書並案內人犯一併拿解赴部命內閣九卿等先將曾靜反復研訊並發看呂留良日記等書據曾靜供稱前因輕信呂留良邪說被其蠱惑兼聞道路浮言愈生疑罔致犯彌天重罪今蒙一一訊問並發呂留良日記等書極其狂悖又知聖朝深恩厚澤皇上大孝至仁心悅誠服自悔從前執迷不悟萬死莫贖今乃如夢初覺等語因俯首認罪甘服上刑內閣九卿等備錄供詞進呈禦覽雍正七年四月乙丑諭內閣九卿等我朝肇造區夏天錫人歸列聖相承中外從乂逮我聖祖仁皇帝繼天立極福庇兆民文治武功恩思德教超教百王普天率土心悅誠服雖深山窮穀庸夫孺子以及凡有血氣之倫莫不尊親詎意逆賊呂留良者悍戾凶頑亂好樂禍自附明代王府儀賓之孫追思舊國憤懣詆譏夫儀賓之後裔于親屬至爲疏賤何足比數且生於明之末季當流寇陷北京時呂留良年方孩童本朝定鼎之後伊親被教澤始獲讀書成立于順治年間應試得爲諸生嗣經歲科屢試以其浮薄之才每居高等盜賊虛名誇榮鄉里是呂留良於明毫之痛癢之關其本心何曾有高尚之節也乃於康熙六年因考試劣等憤棄青衿忽追思明代深怨本朝後以博學鴻詞薦則詭雲必死以山林隱逸薦則剃發爲僧按其歲月呂留良身爲本朝諸生十餘年之久乃始幡然易慮忽號爲明之遺民千古悖逆反覆之人有如是之怪誕無恥可嗤可鄙者乎自是著邪書立逆說喪心病狂肆無忌憚其實不過賣文鬻書營求聲利而遂敢於聖祖仁皇帝任意指斥憑虛撰造公然罵詛所著書文以及日記等類或鐫板流傳或珍藏秘密皆人世耳目所未經意想所未到者朕翻閱之餘不勝惶駭蓋其悖逆狂噬之詞凡爲臣子者所不忍寓之於目不忍出之於口不忍述之于紙筆者也夫普天之下莫非王土率土之濱莫非王臣呂留良於我朝食德服疇以有其子孫者數十年乃不知大一統之義其日記所載稱我朝或曰清或曰北或曰燕或曰彼中至致逆藩吳三桂書亦曰清曰往講若本朝於逆藩爲鄰敵者然何其悖亂之甚乎且吳三桂耿精忠乃叛逆之賊奴人人得而誅之呂留良於其稱兵犯順則欣然有喜惟恐其不成於本朝疆宇之恢復則悵然若失轉形於嗟歎于忠臣殉難則汙以過失且聞其死而快意不顧綱常之倒置惟以助虐迎冠爲心不顧生民之塗炭惟以禍結兵連爲幸何呂留良處心積慮殘忍兇暴至此極也又如僞永曆朱由榔竊立於流寇之中在雲貴廣西等處其衆自相攻劫貽禍民生後兵敗逃竄緬甸順治十八年定西將軍愛星阿等領兵追至緬城先遣人傳諭緬酋令執送朱由榔大軍隨至城下緬人震懼遂執朱由榔獻軍前此僞永曆之實迹豈有被執時滿漢官兵轉于伊馬前皆跪之事瞽說荒唐誕謬極矣總之逆賊呂留良於本朝實有征應之事迹則概爲隱匿而不書而專以造作妖誣快其私憤又文集內雲今日之窮爲羲皇以來所僅見等語夫明末之時朝廷失政貪虐公行橫徵暴斂民不卿生至於流寇肆毒疆場日蹙每歲餉千百萬悉皆出於民力乃斯民極窮之時也我朝掃清寇氣與民休養於是明代之窮民咸有更生之慶逮我聖祖仁皇帝愛育黎元海內殷庶黃童白叟不見兵革蠲租減賦之政史不勝書久道化成休養生息六十餘年民安物阜即考羲皇以來史冊所紀屈指而數蒙上天之眷佑可以比並我朝之盛者不可多得而乃雲羲皇以來未有之窮乎又日記所載怪風震雷細星如慧日光磨蕩皆毫無影響妄捏怪誕之處甚多總由其逆意中幸災樂禍但以捏造妄幻惑人觀聽爲事其失實不經皆不顧也夫災異亦古所時有上天垂象原以儆戒人君令其修省進德若以捉影捕風之語指爲災異傳諸後世或謂從前太平盛世尚有如此非常奇怪災異儻遇日月星辰水旱之變必生輕忽漫不經心凡所以啓後世人君之怠玩者其罪可勝言乎其他倡狂悖亂之詞令人痛心疾首者不可枚舉呂留良生於浙省人文之鄉讀書學問初非曾靜山野窮僻冥頑無知者比且曾靜止譏及於朕躬而呂留良則上誣聖祖皇考之盛德曾靜之謗訕由於誤聽流言而呂留良則自出胸臆造作妖妄是呂留良之罪大惡極有較曾靜爲倍甚者也朕向來謂浙省風俗澆漓人懷不逞如汪景祺查嗣庭之流皆以謗訕悖逆自伏其罪皆呂留良之遺害也甚至民間氓庶亦喜造言生事如雍正四年內有海甯平湖闔城屠戮之謠比時驚疑相煽逃避流離者有之此皆呂留良一人爲之倡道於前是以舉鄉從風而靡甚至地方官吏怵其聲勢之囂陵黨徒之衆勝皆須加意周旋優禮矜式以沽重儒之譽如近日總督李衛爲大臣中剛正之人亦于到任之時循沿往例贈送祠堂匾額況他人乎此其陷溺人心濁亂世俗害有不可勝言者數年以來朕因浙省人心風俗之害可憂者甚大早夜籌畫仁育義正備極化導之苦心近始漸爲轉移日歸於正若使少爲悠忽不亟加整頓則呂留良之邪說誣民者必致充塞膠固于人心而不可解而天經地義之大閑泯沒淪棄幾使人人爲無父無君之人矣今日天道昭然惡貫時至令其奸詐陰險盡情敗露則不容不明正其罪以維持世教彰明國法且呂留良動以理學自居謂己身上續周程張朱之道統夫周程張朱世之大儒豈有以無父無君爲其道以亂臣賊子爲其學者乎此其狎侮聖儒之教敗壞士人之心真名教中之罪魁也朕即位以來實不知呂留良有著述之事而其惡貫滿盈神人共憤天地不容致有曾靜上書總督岳鍾琪之舉曲折髮露以著呂留良之凶頑而呂留良之子如呂葆中者曾應舉成名蒙恩拔置鼎甲仕列清華其餘子孫多遊庠序乃不即毀板焚書以滅其迹且前此一念和尚謀叛之案黨羽連及呂葆中其時逆迹早以彰著蒙聖祖仁皇帝如天之仁免其究問而呂葆中遂憂懼以死就常情而論呂葆中之兄弟子孫遇如此之驚危險禍且荷蒙聖祖仁皇帝如此高厚洪恩尤當感激悔悟共思掩覆前非以爲幸逃誅殛之計豈料冥頑悍驚習與性成仍複保守遺編深藏笥篋此固呂留良以逆亂爲其家傳故世惡相承罔知儆惕而實乃天道昭然不容少昧使逆賊之陰謀徹底呈見於今日逆賊之遺毒不致漏網於天誅也曾靜逆書朕已洞悉知外間逆黨頗衆竟有散佈訛言希圖構亂者然其所詆惟朕之一身朕可以己意自爲判定歸結若如呂留良之罪大惡極獲罪于聖祖在天之靈者至深至重即凡天下庸夫孺子少有一線之良亦無不切齒而豎發不欲與之戴覆天地此亦朕爲臣子者情理之所必然應得已故逆賊呂留良及見在子孫嫡親兄弟子侄照何定例治罪之處著九卿翰詹科道會議直省督撫提督兩司秉公各抒己見詳核定議具奏六月乙亥諭朕前之所批岳鍾琪奏摺偶檢幾件發與曾靜看朕與岳鍾琪君臣之際一德一心在岳鍾琪之忠誠報國公正無私實自古大臣中所罕見而朕以至誠禦下恩眷大臣亦極倚任之優崇詢爲上下交孚明良盛事且朕所批岳鍾琪奏摺甚多此不過數十分中之一分而折內加恩岳鍾琪之處亦不過百分中之一分而曾靜乃欲上書勸之謀反豈非醉生夢死冥頑無知之人乎此乃天道不容令其自行敗露也查曾靜逆書內有傳聞岳鍾琪兩次進京陛見俱不允行岳鍾琪深自危疑因而上書等語曾靜平昔夷狄之見橫介於胸中又聞此無根之語不覺其逆心之愈熾遂爲此孟浪之舉但此傳聞之說必有所自來若曾靜確實供出以曾靜之所犯如此大罪今尚蒙朕之寬宥則傳說浮言者若能悔改亦必從寬貸況傳者未必即爲造言之人若由曾靜供出之人轉究造言之緣起則此事可得歸結著杭奕祿海蘭詳悉宣示曾靜欽此丙戌諭內閣浙江逆賊呂留良凶頑梗化肆爲誣爲謗極盡悖逆乃其逆徒嚴鴻逵者實爲呂留良之羽翼推尊誦法備述遺言又從而恢張揚厲以附益之其詞有較呂留良爲尤甚者夫呂留良以本朝諸生追附前明儀賓之末裔無端反噬憤懣倡狂已屬從古亂臣賊子中罕見至若嚴鴻逵自其祖父已爲本朝之編氓踐土食毛戴高履厚嚴鴻逵之於明代豈有故君舊國之恩而於我朝實被遂生樂育之澤何所庸其感憤何所庸其追憶而亦敢效顰乎茲擇其悖逆之語一併宣示日記有雲索倫地方正月初三日地裂橫五裏縱三裏初飛起石塊後出火近三十裏內居人悉遷避又雲熱河水大發淹死滿州人二萬餘又雲十六夜月食其時見衆星搖動如欲墜狀又或飛或走群向東行又雲舊年七月初四日星變欽於監雲此星出天沛垣入天市垣分野屬吳越有兵起於市井之中凡此荒唐叛逆之語自康熙五十五年至雍正六月內所記載者不勝枚舉其中惟索倫地方擁石出火實有之事蓋彼地氣脈使然前次已經屢見其旁遠近山頂亦有烈焰者而嚴鴻逵以此爲譏訕乎至熱河發水一事因此地山回巒抱中惟一道河流每雨水稍大衆水所彙或致沖決堤岸康熙四十八年六月大雨連晝夜其時附近行宮一帶地處高阜惟隔岸山根之水爲水所漫溢本地久居之民及扈從之官兵皆知雨止水即減退安重不遷惟寄居之匠人等驚惶迷惑或有愚人編木爲筏謂可乘流而渡遂有木筏觸石而解沈溺者數人是時朕以輪班恭請聖安隨從官員二三百人駐紥即在水發之地因約束嚴整無一妄動之人及至水退皆安然無恙無一人被水者乃嚴鴻逵謂淹死滿洲二萬余何妄誕至於斯極且熱河之地五方之人畢集乃嚴鴻逵謂獨淹死滿洲有此理乎嚴鴻逵生今之世爲今之民明代淪亡已久而我朝定鼎業經百年有餘乃臆造訛言好亂樂禍于升平甯謐之時作干戈擾攘之望以聖祖之德盛化神而公然誣衊以今日之民安物阜而朝夕咒詛種種喪心病狂皆拾呂留良之唾余而尤加幻妄豈非凶逆性成萬死有餘之逆賊乎且伊又貌作迂腐曲謹之態浮薄之士簧鼓其虛譽致有廷臣以篡修明史薦舉及伊者伊乃自鳴得意抗慢詭激其自記有雲予自意定當以死拒之耳其大言藐抗若此又雲衡州人張熙字敬卿來見言其師曾靜永興縣人在彼中講學學者稱蒲潭先生從前因讀講義始棄諸生夫以朕特旨詔修明史旁求山林隱逸之士而廷臣薦舉及伊至欲以死力拒竟視朝廷如兒戲等徵召於弁髦而于逆賊曾靜等叛亂悖惡之徒尺書馳間一介相通同數千里之外呼吸相應招納黨類天地間顯圖不軌擾亂綱常未有凶狡至於此極者也似此悖逆叛亂之人煽惑民心且獲罪于聖祖皇考與呂留良黨惡共濟其罪不容于死嚴鴻逵應作何治罪之處著九卿翰詹科道會同速議具奏戊子諭內閣我朝建極綏猷遐邇率育海隅日出莫不尊親乃逆賊呂留良嚴鴻逵凶悖惡亂無父無君著書顯爲謗訕於本朝之大統肆爲詆斥之詞于我聖祖仁皇帝之深仁厚澤偉烈豐功任意爲誣衊慢詛之語其倡狂妄幻肆無顧忌人人痛心疾首不共戴天朕已降諭旨將伊等極惡大罪之處宣示中外諸臣公議治罪至於嚴鴻逵之徒沈在寬生於本朝定鼎數十年之後自其祖父已在覆幬化育之中非止身被德教者可比綱常倫理之大義尤當知懍乃墮惑逆黨之邪說習染凶徒之餘風亦懷不逞附會詆譏慕效梗化之民稱本朝爲清時竟不知其身爲何代之人狂悖已極此沈在寬與呂留良嚴鴻逵黨同叛逆之彰明較著者也至其所著詩集有雲更無地著避秦人又雲陸沈不必由洪水誰爲神州理舊疆此以本朝之宅中立極化理郅隆目爲神州陸沈有同洪水之患其謬戾尤爲狂肆且即以洪水言之明代二百餘年黃運兩河時時潰決生民日有淪爲波臣之懼我聖祖仁皇帝時廑憂勤詳示方略躬親相度至於再三凡所以修築捍禦之策疏浚導制之宜悉經睿慮精詳盡美盡善以致川流循軌黃水安瀾數十年來堤工鞏固億姓永無昏墊之虞共用平成之慶迨朕紹膺丕緒恪遵謨烈加意修防仰荷上天眷佑七年以來河流鹹歸故道海口深通清淮迅暢三省運道遄行無阻至於北直畿輔之地南省浙江等處凡有海塘河渠以及應行經理之處皆漸次興修蓄泄以時旱潦有備府事修和桑麻偏野此時之神州何處可指爲陸沈又何地方可指爲洪水乎且沈在寬雲誰爲神州理舊疆其意欲將神州付之何人經理也沈在寬年未滿四十而亦效其師之狂悖肆詆本朝乃于逆賊曾靜之徒張熙千里論交一見如故賦詩贈答意同水乳此其處心積慮以叛逆爲事其罪實無可逭著交與刑部將沈在寬訊取口供具奏九月癸未以曾靜等口供及歷次所降諭旨刊刻大義覺迷錄頒行天下上諭諸王文武大臣等自古帝王之有天下莫不由懷保萬民恩加四海膺上天之眷命協憶兆之歡心用能統一寰區垂庥奕世蓋生民之道惟有德者可爲天下君此天下一家萬物一體自古迄今萬世不易之常經非尋常之類聚群分鄉曲疆域之私衷淺見所可妄爲同異者也書曰皇天無親惟德是輔蓋德足以君天下則天錫佑之以爲天下君未聞不以德爲感孚而第擇其爲何地之人而輔之理又曰撫我則後虐我則仇此民心向背之至情未聞億兆之歸心有不論德而但擇地之理又曰順天者昌逆天者亡惟有德者乃能順天天之所與又豈因何地之人而有所區別乎我國家肇基東土列聖相承信乂萬邦天心篤祐德教宏敷恩思遐暢登斯民于衽席偏中外而尊親者百年於茲矣夫我朝既仰承天命爲中外生民之主則所以蒙撫綏愛育者何得以華夷而殊視而中外臣民既共奉我朝以爲君則所以歸誠效順盡臣民之道者尤不得以華夷而有異心此揆之天道驗之人理海隅日出之鄉普天率土之衆莫不知大一統之所在悉子悉臣罔敢越志者也乃逆賊呂留良凶頑悖惡好亂樂禍亻叔擾彜倫私爲著述妄謂德佑以後天地大變亙古未經於今複見而逆徒嚴鴻逵等轉相附和備極倡狂餘波及于曾靜幻怪相煽恣爲譭謗至謂八十餘年以來天昏地暗日月無光在逆賊等之意徒謂本朝以滿洲之君入爲中國之主妄生此疆彼界之私遂故爲訕謗詆譏之說耳不知本朝之爲滿洲猶中國之有籍貫舜爲東夷之人文王爲西夷之人曾何損於聖德乎詩言戎狄是膺荊舒是懲者以其潛王猾夏不知君臣之大義故聲其罪而懲艾之非以其爲戎狄而外之也若以戎猶而言則孔子周遊不當至楚應昭王之聘而秦穆之霸西戎孔子刪定之時不應以其誓列于周書之後矣蓋從來華夷之說乃在晉宋六朝偏安之時彼此地醜德齊莫能相尚是以北人詆南爲島夷南人指北爲索虜在當日之人不務修德行仁而徒事口舌相譏已爲至卑至陋之見今逆賊等於一統華夷一家之時而妄判中外謬生忿戾豈非逆天悖理無父無君蜂蟻不若之異類乎且以天地之氣數言之明代自嘉靖以後君臣失德盜賊四起生民塗炭疆域靡寧其時之天地可不謂之閉塞乎本朝定鼎以來掃除群寇寰宇乂安政教興修文明日盛萬民樂業中外恬熙黃童白叟一生不見兵革今日之天地清甯萬姓沾恩超越明代者三尺之童亦皆洞曉而尚可謂之昏暗乎夫天地以仁愛爲心以覆載無私爲量是以德在內近者則大統集於內近德在外遠者則大統集於外遠孔子曰故大德者必受命自有帝王以來其揆一也今逆賊等以冥頑狂肆之胸不倫天心之取捨政治之得失不論民物之安危疆域之大小徒以瑣瑣鄉曲爲阿私區區地界爲忿嫉公然指斥以遂其昧棄彜倫滅廢人紀之逆意至於極盡狂吠之首竟敢指天地爲昏暗豈皇皇上天鑒觀有赫轉不如逆賊等之智識乎且自古中國一統之世幅員不能廣遠其中有不向化者則斥之爲夷狄如三代以上之有苗荊楚玁狁即今湖南湖北山西之地也在今日而目爲夷狄可乎至於漢唐宋全盛之時北狄西戎世爲邊患從未能臣服而有其地是以有此疆彼界之分自我朝入主中土君臨天下並蒙古極邊諸部落俱歸版圖是中國之疆土開拓廣遠乃中國臣民之大幸何得尚有華夷中外之分論哉從來爲君上之道當視民如赤子爲臣下之道當奉君如父母如爲子之人其父母即待以不慈尚不可以疾怨忤逆況我朝之爲君實盡父母斯民之道殫誠求保赤之心而逆賊尚忍肆爲訕謗則爲君者不知何道而後可也從前康熙年間各處奸徒竊發動輒以朱之太子爲名如一念和尚朱一貴者指不勝屈近日尚有山東人張玉假稱朱姓托于明之後裔遇星士推算有帝王之命以此希冀鼓惑愚民見被步軍統領衙門拿獲究問從來異姓先後繼統前朝之宗姓臣服于後代者甚多否則隱匿姓名伏處草野從未有如本朝奸民假稱朱姓搖惑人心若此之衆者似此蔓延不息則中國人君之子孫遇繼統之君必至於無噍類而後已豈非奸民迫之使然乎況明繼元而有天下明太祖即元之子民也以綱常倫紀之豈能逃竄竊之罪至於我朝之於明則鄰國耳且明之天下喪於流賊之手是時邊患四起倭寇騷動流賊之有名目者不可勝數而各村邑無賴之徒乘機劫殺其不法之將弁兵丁等又借征剿之名肆行擾害殺戮良民請功以充獲賊之數中國民人死亡過半即如四川之人竟致靡有孑遺之歎其偶有存者則肢體不全耳鼻殘缺此天下人所共知康熙四五十年間猶有目睹當時情形之父老垂涕泣而道之者且莫不慶倖我朝統一萬方削平群寇出薄海內外之人于湯火之中而登之衽席之上是我朝之有造於中國者大矣至矣至於厚待明代之典禮史不勝書其藩王之後實系明之子孫則格外加恩封以侯爵此亦前代未有之曠典而胸懷叛逆之奸民動則假稱朱姓以爲構逆之媒而呂留良輩又借明代爲言肆其分別華夷之邪說冀遂其叛逆之志此不但爲本朝之賊寇實明代之仇讎也且如中國之人輕待外國之入承大統者其害不過妄意詆譏蠱惑一二匪類而已原無損於是非之公倫常之大儻若外國之君入承大統不以中國之人爲赤子則中國之人其何所托命乎況撫之則後虐之則仇人情也若撫之而仍不以爲後殆非順天合理之人情也假使爲君者以非人情之事加之於下爲下者其能堪乎爲君者尚不可以非人情之事加之於下豈爲下者轉可以此施之於上乎孔子曰君子居是邦也不非其大夫況其君乎又曰夷狄之有君不如諸夏之亡也夫以春秋時百里之國其大夫猶不可非況我朝奉天承運大一統太平盛世而君上尚可謗議乎且聖人之在諸夏猶謂夷狄爲有君況爲我朝之人親被教澤食德服疇而可爲無父無君之論乎韓愈有言中國而夷狄也則夷狄之夷狄而中國也則中國之歷代以來如有元之混一區宇有國百年幅員極廣其政治規模頗多美德而後世稱述者寥寥其時之名臣學士著作頌揚紀當時之休美者載在史冊亦複燦然具備而後人則故爲貶詞概謂無人物之可紀無事功之足錄此特懷挾私心識見卑鄙之人不欲歸美於外來之君欲貶抑淹沒之耳不知文章著作之事所以信今傳後著勸戒於簡編當平心執正而論於外國入承大統之君其善惡尤當秉公書錄細大不遺庶俾中國之君見之以爲外國之主且明哲仁愛如此自必生奮勵之心而外國之君見是非之不爽信直道之常存亦必愈勇愈爲善而深戒爲惡此文藝之公有補於治道者當何如也倘故爲貶抑淹沒略其善而不傳誣其惡而妄載將使中國之君以爲既生中國自享令名不必修德行仁以臻郅隆之治而外國入承大統之君以爲縱能夙夜勵精勤求治理究無望於載籍之褒揚而爲善之心因而自怠則內地蒼生其苦無有底止矣其爲人心世道之害可勝言哉況若逆賊呂留良等不惟於我朝之善政善教大經大法概爲置而不言而更鑿空妄撰憑虛橫議以無影無響之談爲惑世誣民之具顛倒是非紊亂黑白以有爲無以無爲有此其誕幻訁壽張誑人聽聞誠乃千古之罪人所謂民不畏死凡民罔不憝不待教而誅者也非止獲罪於我國家而已此等憸邪之人胸懷思亂之心妄冀僥倖于萬一曾未通觀古今大勢凡首先倡亂之人無不身膏斧钅質遺臭萬年夫以天下國家之鞏固豈烏合鼠竄之輩所能輕言動搖即當世運式微之時其首亂之人曆觀史冊從無有一人能成大事者如秦末之陳涉項梁張耳陳餘等以至元末之劉福通韓林兒陳友諒張士誠等雖一時跳梁究竟旋爲灰燼而唐宋中葉之時其草竊之輩接踵叠迹亦同歸於盡總之此等奸民不知君臣之大義不識天命之眷懷徒自取誅戮爲萬古之罪人而已夫人之所以爲人而異於禽獸者以有此倫常之理也故五倫謂之人倫是闕一則不可謂之人矣君臣居五倫之首天下有無君之人而尚可謂之人乎而懷無君之心而尚不謂之禽獸乎盡人倫則謂人滅天理則謂禽獸非可因華夷而區別人禽也且天命之以爲君而乃懷逆天之意焉有不遭天之誅殛者乎朕思秉彜好德人心所同天下億萬臣民共具天良自切尊君上之念無庸再爲剖示宣諭但憸邪昏亂之小人如呂留良等胸懷悖逆者普天之下不可言止此數賊也因頒此旨特加訓諭若平日稍有存此心者當問天捫心各發天良詳細自思之朕之詳悉剖示者非好辯也古昔人心醇樸是以堯舜之時都俞籲咈其詞甚簡逮至殷周之世人心漸不如前故殷盤周誥所以誥誡臣民者往復周詳肫誠剴切始能去其錮蔽覺其愚蒙此古今時勢之不得不然者每見陰險小人爲大義所折理屈詞窮則借聖人之言以巧爲詆毀曰是故惡夫佞不知孔子之以子路爲佞因數路何必讀書然後爲學之語而發蓋以無理之論而欲強勝於人則謂之佞所謂禦人以口給也若遇呂留良嚴鴻逵曾靜等逆背理惑世誣民之賊而曉以天經地義綱常倫紀之大道使愚昧無知平日爲邪說陷溺之人豁然醒悟不至遭天譴而罹國法此乃爲世道人心計豈可以謂之佞乎天下後世自有公論著將呂留良嚴鴻逵曾靜等悖逆之言及朕諭旨一一刊刻通行頒佈天下各府州縣遠鄉僻壤俾讀書士子及鄉曲小民共知之並令各貯一冊于學宮之中使將來後學新進之士人人觀覽知悉倘有未見此書未聞朕旨者經朕隨時察出定將該省學政及該縣教官從重治罪特諭丁未怡親王大學士九卿翰詹科道等遵旨訊問曾靜張熙照大逆不道律即行正法上禦乾清宮召入諸臣等並令李紱隨入諭曰今日諸臣合詞請誅曾靜張熙伊等大逆不道實從古史冊所未有以情罪論之萬無可赦但朕之不行誅戮者實有隱衷上年曾靜之徒張熙詭名投書與岳鍾琪岳鍾琪倉卒之間忿怒驚惶不及籌算即邀巡撫西琳臬司碩色坐於密室將張熙嚴加根究問其指使之人張熙不肯供出真實姓名旋即加以刑訊而張熙甘死不吐岳鍾琪無可如何越二三日百計曲誘許以同謀迎聘伊師與之盟神設誓張熙始將姓名一一供出彼時岳鍾琪具奏前來朕披覽之下爲之動容岳鍾琪誠心爲國家發奸摘伏假若朕身曾與人盟神設誓則今日亦不得不委曲以期無負前言朕洞鑒岳鍾琪之心若不視爲一體實所不忍況曾靜等僻處鄉村爲流言所惑其捏造謗言之人實系阿其那塞思黑門下之凶徒太監等因犯罪發遣廣西心懷怨忿造作惡語一路流傳今已得其確據若非因曾靜之事則謠言流布朕何由聞知爲之明白剖晰俾家喻而戶曉耶且從來國家之法原以有懲一儆百曾靜等之悖逆諒宇宙內斷無第二人即後世亦可斷其必無有與之比者何必存懲一儆百之見所以寬宥其罪並非博寬大名而廢法也一切朕另有諭旨戊申諭自古凶頑之徒心懷悖逆語涉詆誣者史冊所載不可枚舉然如今日曾靜此事之怪誕離奇訁壽張爲幻實從古所未見爲人心之所共忿國法之所斷不可寬者然朕往復思之若伊訕謗之語有一事之實在朕有幾微不可問心之處則不但曾靜當蓄不臣之心即天下臣民亦應共懷離異之志若所言字字皆虛與朕躬毫無干涉此不過如荒山窮穀之中偶聞犬吠鴞鳴而已又安得謂之訕謗乎上年此事初發之時朕即坦然於懷實無絲毫忿怒之意笑而覽之此左右大臣皆深知者嗣令侍郎杭奕祿副都統海蘭前往湖南拘曾靜到案明白曉諭逐事開導動以天良祛其迷惑而伊始豁然醒悟悔過感恩其親筆口供不下數萬言皆本于良心之發見而深恨從前之誤聽浮言遂妄萌悖逆之念甘蹈赤族之誅也蓋其分別華夷中外之見則蔽錮陷溺于呂留良不臣之邪說而其謗及朕躬者則阿其那塞思黑允衤我允衤題等之逆党奸徒造作蜚語布散傳播而伊誤信以爲實之所致自上年至今已將一載朕留心體察並令內外大臣各處根究今此案內著初書造謗言之首惡俱已敗露確有證據並不始于曾靜者盡明白矣與朕初意毫無差謬則曾靜之誤聽尚有可原之情而無必不可寬之罪也阿其那等蓄心陰險存傾陷國家之念懷與皇考爲仇之心而一一加之於朕總因阿其那等平日之逆謀不遂蓄養匪類者久矣播散訛言分門立戶各各收買黨羽欲以鼓惑人之耳目俾素蓄逆念之人蠢動而起然後快心祖宗之社稷所不顧也夫加朕以凶暴惡名其罪猶輕獨念聖祖皇考六十餘年之豐功懋烈而作如此歸結豈爲人子者所忍爲乎阿其那塞思黑等之罪實萬世不足以贖矣伊等之奸謀若此自今敗露者即不勝其數其他匪類邪黨之聽其驅使者奚止數千百人造作種種誣謗之語已流散于極邊遠塞則宇宙之內鄉曲愚人爲其所惑者豈止曾靜數人而已哉即如三姓之協領華賚身在地方有稽查之責乃伊將所見所聞俱行隱瞞不以入告朕在九重大內則由而知之何從而究之又何自而剖晰開示使天下臣民共曉之今蒙上天皇考俯垂默佑令明神驅使曾靜自行投首總督岳鍾琪之前俾造書造謗之奸人一呈露朕方得知若輩殘忍之情形明目張膽將平日之居心行事遍諭荒陬僻壤之黎民而不爲浮言所惑于萬一亦可知阿其那寒思黑等蓄心之慘毒不忠不孝爲天祖之所不容國法之所難宥俾天下後世亦得諒朕不得已之苦衷矣此朕不幸中之大幸非人力之所能爲者即此則曾靜不爲無功即此可以寬其誅矣從來奸究凶醜造作妖言欲以誣民惑衆者無時無之即如從前妖言雲帝出三江口嘉湖作戰場此語已流傳三十餘年矣又如廣西張淑榮等言欽天監奏紫微星落于福建今朝廷降旨遣人至閩將三歲以上九歲以下之男子悉行誅戮又如山東人張玉假稱朱姓系前明後裔遇星士推算伊有帝王之命似此誕幻荒唐有關世道人心之語往往地方大臣官員希圖省事目爲瘋顛苟且掩護于一時而未念及迷惑之害日月漸遠傳播漸多遂不能究問其所自來轉令無辜之人受其牽累此皆庸碌無能視國家利害如膜外之大臣等養癰之害也又如村塾訓蒙之人本無知識而又困窮無聊心懷抑鬱往往造爲俚鄙怪妄之歌詞授于村童傳唱而不知者遂誤認以爲童謠轉相流布此皆奸民之欲煽惑人心紊亂國法者地方大吏有司視爲泛常不加稽察懲創以防其漸可乎前年有人捏稱侍郎舒楞額密奏八旗領米一事欲以搖惑旗人之心舒楞額聞之據實入奏此時降旨根究即得其造言之人加以懲戒凡屬流言初起之時若地方大臣即肯悉心窮究必能得其根由使奸宄不至漏網庸愚無知亦不至拖累其有裨于人心世道者良非淺鮮今因曾靜之事而查出首先造謗之渠魁蓋以此案發覺甚早易於追尋故可遞推而得其根源也且朕之寬宥曾靜非矯情好名而爲此舉也虞書曰宥過無大刑故無小曾靜之過雖大實有可原之情昔我皇考時時訓誨子臣曰凡人孰能無過若過而能改即自新遷善之機故人以改過爲貴但實能改過者無論所犯之大小皆不當罪之也朕只承聖訓日以改過望天下之人蓋過大而能改勝於過小而不改者若曾靜可謂改過者矣朕赦曾靜正欲使天下臣民知朕於改過之人無不可赦之罪相率而趨於自新之路也且朕治天下不以私喜而賞一人不以私怒而罰一人曾靜狂悖之言止於謗及朕躬並無反叛之實事亦無同謀之衆党彼跳梁逆命之人果能束身歸命畏罪投誠尚且邀赦宥之典豈曾靜獨不可貸其一死乎且曾靜之前後各供俱系伊親筆書寫並非有所勉強逼勒亦並非有人隱授意指實由於天良感動是以悛悔之心迫切誠懇形於紙筆此乃其可原之情並非以其爲諂媚頒揚之詞而欲寬其罪也若今日喜其諂媚而曲宥之而從前即當怒其誣謗而速誅之矣況曾靜今日頌揚之詞較之從前誣謗之語其輕重懸殊何止什佰論其情罪豈足相抵若有人議朕喜曾靜之諂媚而免其罪者則與曾靜從前之犬吠鴞鳴無以異矣然朕亦不論除造作布散流言之逆黨另行審明正法外著將曾靜張熙免罪釋放並將伊之逆書及前後審訊詰問之語與伊口供一一刊刻頒佈使天下之人共知之楚省地方大小官員等平日既不能宣佈國恩敷揚朕訓化誨百姓盡去邪心致有此等愚昧狂亂之人實有忝于父母斯民之責此則深當愧恥者今若以羞忿怨恨之心或將曾靜張熙有暗中賊害情形朕必問以抵償之罪曾靜等系特旨赦宥之人彼本地之人若以其貽羞桑梓有嫉惡暗傷者其治罪亦然即朕之子孫將來亦不得以其詆毀朕躬而追究誅戮之蓋曾靜之事不與呂留良等呂留良之罪乃皇考當日所未知而未赦者是以朕今日可以明正其罪若曾蒙皇考赦免之旨則朕亦自遵旨而曲宥其辜矣特諭己酉怡親王等奏伏讀上諭寬宥曾靜仰見我皇上大度包涵如天之無不復如地之無不載雖惡獸毒蛇魑魅魍魎不忍以雷霆殲滅欲使之革面回心自堯舜禹湯以至於今未聞此寬大之典也伏思我朝創業垂統列祖聖聖相承聖祖仁皇帝禦極六十餘年豐功駿烈炳耀日星厚澤深仁浹洽宇宙皇上嗣統建極大孝大德至聖至誠宵旰勤民仁育義正躬行節儉俾藏富閭閻廣沛恩膏以普甯黎庶蠲賑動盈億萬教養溥遍遐荒數年以來年歲豐登民氣和樂嘉祥駢集風俗阜成舉凡含齒戴發之儔靡不沐浴皇風歌詠帝德山陬海澨僻壤窮鄉鹹順則懷恩心悅誠服乃有曾靜者性與人殊凶狡狂幻蠱惑于逆賊呂留良之反書悖論複道聽阿其那塞思黑門下之奸徒匪類散佈誣捏毫無影響之流言輒敢編集蜚語繕寫謗書令其徒張熙從湖南遠至陝西赴總督岳鍾琪衙門投遞雖不能爲反叛之事實素蓄反叛之心是以惡貫滿盈神明驅遣令其自行敗露身服典刑以消異類之邪說以正天下之人心也經年以來中外臣民聞其嗥吠皆切不共戴天之忿思食其肉而寢其皮今皇上沛如天之仁憫其始由的今已悔悟情有可原特加寬宥伏讀聖諭以改過望天下之人過大而能改勝於過小而不改若實能改過則無不可赦之罪又念跳梁逆命者畏罪投誠尚邀從寬之典大哉皇言寬仁好生之德度越千古但曾靜梟獍性成陰謀不軌誣謗悖逆罪惡彌天查律例開載十惡凡謀反叛逆及大不敬皆當赦之所不原是曾靜之罪在十惡乃三宥之所不及而張熙與曾靜共謀不軌赴陝投遞逆書思欲構亂亦所難寬仰祈皇上敕下法司即將曾靜張熙按律處決碎屍懸首查其親屬逆党盡與殲除以明朝廷之憲章慰臣民之共憤得旨寬宥曾靜等一案乃諸王大臣官員等所不可贊一辭者天下後世或以爲是或以爲非皆朕身任之於臣工無與也但朕亦再四詳慎所降諭旨俱已明晰諸王大臣官員等不必再奏各省督撫提鎮有因朕寬宥曾靜等複行奏請者著通政司將本發還雍正八年十二月刑部等衙門會議呂留良身列本朝子衿妄附前代儀賓之裔追思舊國詆毀朝章造作惡言妄行記撰倡狂悖亂罪惡滔天甚至敢將聖祖仁皇帝誣衊指斥悖逆已極臣等莫不切齒痛心允宜按律治罪顯加誅滅以扶人紀以絕亂源呂留良應剉屍梟示財産入官伊子呂葆中曾叨仕籍世惡相濟前此一念和尚謀叛案內連及呂葆中逆迹彰著亦應剉謲屍梟示呂毅中應擬斬立決伊子孫並兄弟伯叔兄弟之子及女妻妾姊妹之子妻妾應行文該督查明按律完結並行知各省府州縣將大逆呂留良所著文集詩集日記及他書已經刊刷及鈔錄者于文到日出示遍諭勒限一年盡行焚毀得旨呂留良懷悖逆不臣之心假託先儒糟粕餘論欺世盜名以致人心陷溺爲其迷惑已久愚昧之徒稱爲夫子幾謂其駕乎程朱之上甚至奉祀書院以尊崇之今其逆謀穢行無不敗露天下焉有喪滅倫常猶得託名於理學之林而著作尚有可取者乎今內外臣工等合詞陳奏朕思呂留良之罪從前諭旨甚明在天理國法萬無可寬然天下至廣讀書之人至多或者千萬人中尚有其人謂呂留良之罪不至於極典者朕慎重刑罰誅奸鋤叛必合乎人心之大公以昭與衆棄之之義至其所著書集臣工等奏請焚毀複思呂留良不過盜襲古人之緒余以肆其狂誕空浮之論有識見者固不待言即當日被其愚惑者今亦自然窺其底裏而嗤笑之也況其人品術若此其言更何可取今若焚滅其迹假使毀棄不盡則事屬空文倘毀棄盡絕則將來未見其書者轉疑伊之著述實能闡發聖賢精蘊而惜其不可複得也即呂留良書籍中有大逆不道之語伏思我聖祖仁皇帝聖德神功際天蟠地如日月之照臨宇宙萬古爲昭豈呂留良所能虧蔽于萬一乎著將廷臣所議行文直省學政遍行詢問各學生監等應否照議將呂留良呂葆中剉質焄墒荊磷勇酪闃姓毒觶鋶所著文集詩集日記及他書已經刊刻刷印暨鈔錄者盡行燔毀之處著秉公據實作速取具該生監等結狀具奏其有獨抒己見令其自行具呈該學政一併具奏不可阻撓隱匿俟具奏到日再降諭旨雍正十年十二月刑部等衙門議奏逆賊嚴鴻逵梟獍性成心懷叛逆與呂留良黨惡共濟誣捏妖言實複載所難容爲王法所不貸嚴鴻逵應淩遲處死已伏冥誅應戮屍梟示其祖父父子孫兄弟及伯叔父兄弟之子男十六以上皆斬立決男十五以下及嚴鴻逵之母女妻妾姊妹子之妻妾俱解部給功臣之家爲奴財産入官沈在寬傳習呂留良嚴鴻逵之邪說倡狂悖亂附會詆譏允宜速正典刑淩遲處死其嫡屬等均照律治罪又呂留良案內黃補庵自稱私淑門人所作詩詞荒唐狂悖車鼎豐車鼎賁刊刻逆書往來契厚孫用克陰相援結周敬輿甘心附逆私藏禁書黃補庵應擬斬立決妻妾子女給功臣之家爲奴父母祖孫兄弟流二千里車鼎豐等但擬斬監候又呂留良案內被惑門徒房明疇金子尚應革去生員杖一百僉妻流三千里陳祖陶沈允懷沈成之董呂音李天維費定原王立夫施子由沈鬥山沈惠侯沈林友應革去教諭舉人監生生員杖一百徒三年朱霞山朱芷年從學嚴鴻逵時年尚幼小張聖范朱羽采令伊等幼子從沈在寬附學訓蒙審無與沈在寬交好之處應無庸議得旨嚴鴻逵著戮屍梟示其孫著發甯古塔給與披甲人爲奴沈在寬著改斬立決黃補庵已伏冥誅其嫡屬照議治罪車鼎豐車鼎賁孫用克周敬輿具依擬應斬著監候秋後處決房明疇金子尚俱著僉妻流三千里陳祖陶等十一人著杖責完結張聖范朱羽采朱霞山朱芷年著釋放謝濟世之獄觀謝濟世之獄而歎監謗之道至矣盡矣錄上諭一節俾見當時雄主所以操縱臣民之作用焉雍正七年七月辛醜諭內閣據順承郡王錫保以在軍前效力之謝濟世注釋大學譭謗程朱參奏前來朕觀謝濟世所注之書意不止譭謗程朱乃用大學內見賢而不能舉兩節言人君用人之道藉以抒寫其怨望誹謗之私也其注有拒諫飾非必至拂人之性驕泰甚矣等語觀此則謝濟世之存心昭然可見朕即位以來於用人之際至公無私不惟可以自信亦天下臣民所共知者即以田文鏡謝濟世二人之事言之田文鏡在聖祖仁皇帝時爲內閣侍讀學士朕從未識其面亦並未知其姓名因雍正元年伊奉差祭告華山回京陛見將山西通省荒歉情形急切陳奏備極周詳朕以山西被災其時之巡撫德音身在地方匿不奏聞而田文鏡以奉差經過之員念切民瘼直言不隱其忠君愛國之忱悃深屬可嘉遂令田文鏡前往山西撫綏賑濟伊到彼果能盡心辦理於是將伊授爲山西布政使令與諾岷和衷共濟嗣因河南諸事廢弛調任河南布政使未幾擢爲河南巡撫見今授以河東總督之任一二年間深加信任尚可謂之見賢而不能舉舉而不能先乎又如李紱蔡珽與黃振國邵言綸汪諴等結黨行私營求報復而謝濟世奸惡狼戾聽其指揮參奏田文鏡貪贓納賂任意誣衊借直言敢諫之名行其排擠傾陷之計朕當謝濟世陳奏之時立即洞燭其奸拿交刑部審問朕尚未忍置之重典著令革職發往軍前效力贖罪一時在廷諸臣無不以爲至公至當似此尚可謂之見不善而不能退退而不能遠乎至於朕心並無私好私惡惟以其人之善惡爲好惡以衆論之是非爲好惡何嘗預存成見於胸中即如引見各官有見其才具似優者亦令該上司試看有見其人似屬平常者亦令該上司試看並諭令該上司秉公考課不必存迎合瞻顧之念是以各員蒞任之後或朕旨曾獎其優而督撫參劾者多有之或朕旨以爲平常而督撫保奏稱職者亦有之朕未嘗以一己之好惡令天下督撫以阿徇而各督撫亦能仰體朕意從未嘗以朕之好惡漫爲迎合也朕之用人惟期有益於國計民生者可謂之好人之所惡惡人之所好乎謝濟世于公正任事之田文鏡則肆行誣參于婪贓不法之黃振國以及常護鑽營之李紱蔡珽邵言綸汪諴等則甘聽其指使而爲之報復乃直顛倒是非紊亂黑白好惡拂人之性者矣天理國法所不能容災已逮身而猶不知省懼何其謬妄至於此極夫拒諫飾非之說乃朕素所深戒然必責難陳善忠言讜論而後可以謂之諫若乃排擠傾陷之私言奸險狡惡之邪論豈可以直諫自居而冀朕之聽受耶試問謝濟世數年以來伊爲國家敷陳者何事爲朕躬進諫者何言朕所拒者何諫所飾者何非除處分謝濟世黨同伐異誣陷良臣之外尚能指出一二事否乎謝濟世以應得重罪之人從寬令其效力乃仍懷怨望恣意謗訕甚爲可惡應作何治罪之處著九卿翰詹科道秉公定議具奏胡中藻之獄康熙間屢次文字獄雖文網深密然因天下未定其所對付者亦半屬實意爲難之人霸者爲自衛計尚非得已也至如乾隆間胡中藻一案觀其成讞之詞真可以莫須有三字盡之矣且在彼時何必更作如是手段而竟作如是手段者則高宗與聖祖世宗才略之高下亦可見耳今掇拾諸上諭記其始末如下乾隆二十年三月上召大學士九卿翰林詹事科道等諭曰我朝撫有方夏於今百有餘年列祖列宗深仁厚澤漸洽區宇薄海內外共用升平凡爲臣子自乃祖乃父以來食毛踐土宜共胥識尊親大義乃尚有出身科目名列清華而鬼蜮爲心於語言吟詠之間肆其悖逆詆訕怨望如胡中藻者實非人類中所應有其所刻詩題曰堅磨生詩鈔堅磨出自魯論孔子所稱磨涅乃指佛肸而言胡中藻以此自號是誠何心從前查嗣庭汪景祺呂留良等詩文日記謗訕訁壽張大逆不道蒙我皇考申明大義嚴加懲創以正倫紀而維世道數十年來意謂中外臣民鹹知儆惕而不意尚有此等鴟張狺吠之胡中藻即檢閱嗣庭等舊案其悖逆之詞亦未有累牘連篇至於如此之甚者如其集內所雲一世無日月又曰又降一世夏秋冬三代而下享國之久莫如漢唐宋明皆一再傳而多故本朝定鼎以來承平熙皞蓋遠過之乃曰又降一世是尚有人心者乎又曰一把心腸論濁清加濁字於國號之上是何肺腑至謁羅池廟詩則曰天匪開清泰又曰斯文欲被蠻滿洲俗稱漢人曰蠻子漢人亦俗稱滿洲曰韃子此不過如鄉籍而言即孟子所謂東夷西夷是也如以稱蠻爲斯文之辱則漢人之稱滿洲曰韃子者亦將有罪乎再觀其與一世爭在醜夷之句蓋可見矣又曰相見請看都盎背誰知生色屬裘人此非謂旃裘之人而何又曰南斗送我南北斗送我北南北斗中間不能一黍闊又曰再泛瀟湘朝北海細看來歷是如何又曰雖然北風好難用可如何又曰至雲揭北斗怒竅生南風又曰暫歇南風競兩兩以南北分提重言反復意何所指其語溪照景石詩中用周時穆天子車馬走不停及武皇爲失傾城色兩典故此與照景石有何關涉特欲藉題亦以寓其譏刺訕謗耳至若老佛如今無病病朝門聞說不開開之句尤爲奇誕朕每日聽政召見臣工何乃有朝門不開之語又曰人間豈是無中氣此是何等語乎其和初雪元韻則曰白雪高難和單辭贊莫加單辭出尚書呂刑于詠雪何涉進呈南巡詩則曰三才生後生今日天地人爲三才生於三才之後是爲何物其指斥之意可勝誅乎又曰天所照臨皆日月地無道裏計西東諸公五嶽諸侯瀆一百年來俯首同蓋謂岳瀆蒙羞俯首無奈而已謗訕顯然又曰亦天子亦萊衣兩亦字悖慢已極又曰不爲遊觀縱盜驪八駿人所常用必用盜驪又何所取又曰一川水已快南巡下接雲周王淠彼因時邁蓋暗用昭王南征故事謂朕不之覺耳又曰如今亦是塗山會玉帛相方十倍多亦是二字與前亦字同意其頌蠲免則曰那似偏災今降雨況如平日佛燃燈朕一聞災歉立加賑恤何乃謂如佛燈之難睹耶至如孝賢皇后之喪乃有並花已覺單無蒂之句孝賢皇後系朕藩邸時皇考世宗憲皇帝禮聘賢淑作配朕躬正位中宮母儀天下者一十三年然朕亦何償令有幹與朝政驕縱外家之事此誠可對天下後世者至大事之後朕恩顧飾終然一切禮議並無於會典之外有所增益乃胡中藻與鄂昌往復酬詠自謂殊似晉人是已爲王法所必誅而其詩曰其夫我父屬妻皆母道之女君君一體焉得漠然爲夫君父人之通稱君應冠于父上曰父君尚不可而不過謂其父之類而已可乎帝後也而直斥曰其夫曰妻喪心病狂一至於此是豈覆載所可容者乎他如自桂林調回京師則曰得免我冠是出頭伊由翰林洊擢京堂督學陝西複調廣西屢司文柄其調取回京並非遷謫乃以挂冠爲出頭有是理乎又有曰一世璞誰完吾身甑恐破又曰若能自主張除是脫畺鎖又曰一世眩如鳥在笯又曰虱官我曾慚又曰天方省事應閑我又曰直道恐難行又曰世事於今怕捉風無非怨悵之語述懷詩又曰瑣沙偷射域饒舌狠張箕賢良祠詩又曰青蠅投昊肯容辭試問此時於朕前進讒言者誰乎伊在鄂爾泰門下依草附木而詩中乃有記出西林第一門之句攀援門戶恬不知恥朕初見其進呈詩文語多險僻知其心術叵測於命督學政時曾訓以論文取士宜崇平正今見其詩中即有下眼訓平夷之句下眼並無典據蓋以爲垂照之義亦可以爲識力卑下亦可巧用雙關雲耳至其所出試題內孝經義有乾三爻不象龍說乾卦六爻皆取象于龍故象傳言時乘六龍以禦天如伊所言豈三爻不在六龍之內耶乾隆乃朕年號龍與隆同音其詆毀之意可見又如鳥獸不可與同群狗彘食人食牝雞無晨等題若謂出題欲避熟經書不乏閑冷題目乃必檢此等語句意何所指其種種悖逆不可悉數十餘年來在廷諸臣所和韻及進呈詩冊何止千萬首其中字句之間亦偶有不知檢點者朕俱置而不論從未嘗以語言文字責人若胡中藻之詩措詞用意實非語言文字之罪可比夫謗及朕躬猶可謗及本朝則叛逆耳朕見其詩已經數年意謂必有明于大義之人待其參奏而在廷諸臣及言官中並無一人參奏足見相習成風牢不可破朕更不得不申我國法正爾囂風效皇考之誅查嗣庭矣且內延侍從曾列卿貳之張泰開重師門而罔顧大義爲之出資刊刻至鄂昌身爲滿洲世仆歷任巡撫見此悖逆之作不但不知憤恨且喪心與之唱和引爲同調其罪實不容誅此所關於世道人心者甚大用俾天下後世共知炯鑒張泰開著革職拿交刑部胡中藻鄂昌已降旨拿解來京俟到日交大學士九卿翰林詹事科道公同逐節審定擬具奏庚子諭滿洲風俗素以尊君親上樸城忠敬爲根本自騎射之外一切玩物喪志之事皆無所漸染乃近來多效漢人習氣往往稍解章句即妄爲詩歌動以浮奈相尚遂致古風日遠語言誕慢漸成惡習即如鄂昌身系滿洲世受國恩乃任廣西巡撫時見胡中藻悖逆詩詞不但不知憤恨且與之往復唱和實爲喪心之尤今檢其所作塞上吟詞句粗陋鄙率難以言詩而其背謬之甚者且至蒙古爲胡兒夫蒙古自我朝先世即傾心歸附與滿洲本屬體乃目以胡兒此與自加詆毀者何異非忘本而何又如鄂昌家查出塞爾赫曉亭詩鈔內有作明泰妾杜貞姬詩一首初似明泰身遭不幸本非其罪者及查閱原案始知明泰身爲協領侵獨兵丁錢糧其罪本即應正法我皇考世宗憲皇帝如天之仁將伊解送寧夏永遠枷號實屬格外寬典而塞爾赫所作詩序但知贊其妾爲貞姬遂飾爲仇家行刺等語此直變亂黑白不自知其矯誣矣究之明泰今竟以占田謀殺二命正法夫以如此惡人而有貞姬爲妾之理乎夫滿洲未經讀書素知尊君親上之大義即孔門以詩書垂教亦必先以事君事父爲重若讀書徒剽竊浮華而不知敦本務實之道豈孔門垂教之本意況藉以詆呵譏刺居心日就險薄不更爲名教罪人耶此等弊俗斷不可長著將此通行傳諭八旗令其務崇敦樸舊規毋失先民矩矱倘有託名讀書無知妄作侈口吟詠自蹈囂陵惡習者朕必重治其罪四月丁未諭軍機大臣等胡中藻自回籍後所作詩稿甚多且其詞氣與刻集迥異必由先已知覺訊據胡中藻有廣信府親戚張紹衡自京捐納回南至伊家吊唁見書架上有堅磨生詩集刻本因說此書以達禦覽胡中藻問爾何所聞張紹衡答以裘曰修即曾說過之語遂遣人詢之伊兄張紹渠據稱張紹衡上年三月回家此後並未來京亦未到伊任所等語著傳諭胡寶珠即速提張紹衡到省審訊張紹衡是否聞之裘曰修如何向伊說知是否屬伊傳語胡中藻伊如何傳述之處一一訊取確供在張紹衡不過無心傳述有則不必躲避無亦不可妄承或伊別有來歷總期訊出實在情形使此事明晰如張紹衡能將實情供出尚無大咎若枝梧掩飾亦必終於水落石出該撫先將供情由驛馳奏一面將張紹衡押送來京質對再胡中藻在本籍曾刻詩斗方詆毀地方官其中必有關涉朝廷處何以查送雜稿詩片內並無此件該省如有人收存務須查追再胡中藻家中書籍內有預紀略二本複齋錄六本查系何等書有無關係一併送來甲寅大學士九卿翰詹科道等奏稱胡中藻違天叛道覆載不容合夥大逆淩遲處死該犯的屬男十六歲以上皆斬立決張泰開明知該犯詩鈔悖逆乃敢助資刊版出名作序應照知情隱匿律斬立決其與逆犯酬答之相冒俟拿解到日另議諭朕禦極以來從未嘗以語言文字罪人在廷諸臣和進詩冊何止數千萬篇其中字句謬戾亦所時有朕皆不加指摘何惡于胡中藻一人實以其所刻堅磨生詩內連篇累牘無非謗訕詆毀之詞不惟謗及朕躬且敢詆毀國家本朝撫臨中夏百有餘年凡天下臣民自祖父以至孫子世蒙教養深恩而胡中藻逆倫悖叛乃至於此其得罪于列祖列宗者至大昔皇考于查嗣庭等案大示義正意狂誕之徒必應知所畏懼而不謂尚有胡中藻其人自不得不申明憲典以警囂頑今大學士九卿翰詹科道等公同確訊屢經面對僉請處以極刑自屬按律定擬朕意肆市已足示衆胡中藻免其淩遲著即行處斬爲天下後世炯戒胡中藻系鄂爾泰門生文辭險怪人所共知而鄂爾泰獨加讚賞以致肆無忌憚悖慢訁壽張且于其侄鄂昌敘門誼論杯酒則鄂爾泰從前標榜之私適以釀成惡習耳胡中藻依附師門甘爲鷹犬其詩中讒舌青蠅據供實指張廷玉張照二人可見其門戶之見牢不可破即張廷玉之用人亦未必不以鄂爾泰胡中藻輩爲匪類也鄂爾泰張廷玉亦因遇皇考及朕之君不能大有爲耳不然何事不可爲哉大臣立朝當以公忠體國爲心若各存意見則依附之小人遂至妄爲揣摩群相附和漸至判若水火古來朋黨之弊悉由於此鄂爾泰爲滿洲人臣尤不應蹈此惡習今伊侄鄂昌即援引世誼親昵標榜積習蔽錮所關於世道人心者甚巨使鄂爾泰此時尚在必將伊革職重治其罪爲大臣植党者戒鄂爾泰著撤出賢良祠不准入祀其配享太廟系奉皇考遺詔遵行與見在准張廷玉之配享相同應仍照舊張泰開本一庸懦無能之人其出資刊刻由被勒索而序文又俱系胡中藻自構張泰開著從寬免其治罪即著釋放仍在上書房行走效力贖罪胡中藻之母年已八十其孫亦在幼稚及伊弟胡中藩等著從寬免其緣坐其胡中藻詩案內一應幹涉之人除鄂昌俟解京之日另行審結外其餘俱著加恩一概免其查究至於李蘊芳身爲縣令乃以檢驗爲害反復嗟怨甚屬狂悖該撫現以貪婪題參革職俟審擬到日再降諭旨餘依議吾嘗讀乾隆間禦史曹一士請寬比附妖言之獄兼禁挾仇誣告詩文以息惡習一摺雲古者大史采詩以觀民風藉以知列邦政治之得失俗尚之美惡即虞書在治忽以出納五言之意使下情之上達也降及周季子産猶不禁鄉校之議惟是行僻而堅言僞而辨雖屬聞人聖人亦必有兩觀之誅誠惡其惑衆也往者造作語言顯有背逆之迹如罪人戴名世汪景祺等聖祖世宗因其自蹈大逆而誅之非得已也若夫賦詩作文語涉疑似如陳鵬年任蘇州府知府遊虎邱作詩有密奏其大逆不道者聖祖明示九卿以爲古來誣陷善類大率如此如神之哲洞察隱微可爲萬世法則比年以來小人不識兩朝所以誅殛大憝之故往往挾睚眥之怨借影響之詞攻訐詩書指摘字句有司見事風生多方窮鞫或致波累師生株連親故破家亡命甚可憫也臣愚以井田封建不過迂儒之常談不可以爲生今反古述懷詠史不過詞人之習態不可以爲援古刺今即有序跋偶遺紀年亦或草茅一時失檢非必果懷悖逆敢於明布篇章使以此類悉皆比附妖言罪當不赦將使天下告訐不休士子以文爲戒殊非國家義以正法仁以包蒙之意伏讀皇上諭旨凡奏疏中從前避忌之事一概掃除仰見聖明廓然大度即古敷奏采風之盛臣竊謂大廷之章奏尚捐忌諱則在野之筆劄焉用吹求請敕下直省大吏查從前有無此等獄案現在不准援赦者條例上請以俟明旨欽定嗣後凡舉首文字者若無的確蹤迹以所告本人之罪依律反坐以爲挾仇誣造者戒庶文字之累可蠲告訐之風可息矣云云觀於此而知當時文字之獄其層見叠出者殆難數計夫即以胡中藻一案論之如上諭中所舉各條任翻何人集中此等語句其孰能免而坐是夷及宗族牽連鈎黨凡有血氣其誰不自危曹氏所謂井田封建述懷詠史者皆可以致大逆不道之罪案無惑乎舉世之學者舍最無用之學術外不敢研究也龔定庵嘗雲積數百數十年之力以振蕩摧鋤天下之廉恥既殄既獼既夷顧乃藉祖父之余蔭一旦責有氣節於其臣不亦暮乎嗚呼非一朝一夕之故所從來漸矣抑世宗不殺曾靜之身不焚呂留良之書而且以其供詞刊佈頒示天下其操縱一世之妙用實有可驚者嘻二千年歷史上雄才大略之君主類此者殆希也
